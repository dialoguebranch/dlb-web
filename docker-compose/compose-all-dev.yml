# Run using: "docker compose -f compose-all-dev.yml up" from the {GIT}/dialoguebranch/dlb-web/docker-compose/ folder

name: dlb-web-all

services:

  ###########
  # MariaDB #
  ###########

  mariadb:
    image: mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ${mariadb_root_password}
    volumes:
      - mariadb:/var/lib/mysql
      - ./dlb-web/docker-compose/import/mariadb/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  ##############
  # phpMyAdmin #
  ##############

  phpmyadmin:
    image: phpmyadmin
    environment:
      PMA_HOST: mariadb
    ports:
      - "8100:80"

  ################################
  # Dialogue Branch Web Services #
  ################################

  dlb-web-services:
    container_name: dlb-web-services
    image: dlb-web-service:dev
    ports:
      - 127.0.0.1:8089:8089
    environment:
      authNativeJwtAccessTokenSecret: ${dlb_web_service_auth_native_jwt_access_token_secret}
      authNativeJwtRefreshTokenSecret: ${dlb_web_service_auth_native_jwt_refresh_token_secret}
      authKeycloakClientSecret: ${keycloak_client_secret}
      mariadbPassword: ${mariadb_root_password}
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - ./dlb-web/dlb-web-service/build/libs/dlb-web-service-1.2.5.war:/usr/local/tomcat/webapps/dlb-web-service.war
      - ./dlb-web/dlb-external-var-service/build/libs/dlb-external-var-service-1.2.5.war:/usr/local/tomcat/webapps/dlb-external-var-service.war

  ########################################
  # Keycloak Identity Management Service #
  ########################################

  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak
    ports:
      - "8081:8080" # external_port:internal_port
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${keycloak_admin_username}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${keycloak_admin_password}
      KC_DB: mariadb
      KC_DB_URL_HOST: mariadb
      KC_DB_USERNAME: root
      KC_DB_PASSWORD: ${mariadb_root_password}
    entrypoint:
      - /bin/sh
      - -c
      - mkdir -p /opt/keycloak/data/import && sed -e "s/\(\"secret\"\s*:\s*\)\"[^\"]*\"/\1\"${keycloak_client_secret}\"/" /opt/keycloak/data/import-source/dialoguebranch-realm.json > /opt/keycloak/data/import/dialoguebranch-realm.json && /opt/keycloak/bin/kc.sh start-dev --import-realm
    volumes:
      - ./dlb-web/docker-compose/import/dialoguebranch-realm.json:/opt/keycloak/data/import-source/dialoguebranch-realm.json

networks:
  local_network:
    driver: bridge

volumes:
  mariadb:
