info:
  name: login
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8089/dlb-web-service/v1/auth/login
  body:
    type: json
    data: |-
      {
        "user": "user",
        "password": "user",
        "tokenExpiration": 0
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
